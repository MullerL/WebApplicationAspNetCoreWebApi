<main class="main">
  <p-toast />
  <p-confirmDialog />

  <div class="content">
    <div class="left-side">
      <h2>Produtos</h2>
      <div *ngIf="loading">Carregando...</div>
      <div *ngIf="error" style="color:red">{{ error }}</div>

      <!-- Formulário -->
      <form (ngSubmit)="salvarProduto()" #formProduto="ngForm" style="margin-bottom:1rem;">
        <div class="flex gap-2 mt-2">
          <!-- Nome -->
          <input pInputText
                 type="text"
                 name="nome"
                 [(ngModel)]="produtoForm.nome"
                 placeholder="Nome"
                 maxlength="100"
                 required />

          <!-- Preço -->
          <p-inputNumber name="preco"
                         [(ngModel)]="produtoForm.preco"
                         placeholder="Preço"
                         mode="currency"
                         currency="BRL"
                         locale="pt-BR"
                         required></p-inputNumber>

          <!-- Quantidade -->
          <p-inputNumber name="quantidade"
                         [(ngModel)]="produtoForm.quantidade"
                         placeholder="Quantidade"
                         [showButtons]="true"
                         required></p-inputNumber>

          <!-- Botões -->

          <p-button type="submit"
                    [disabled]="formProduto.invalid"
                    [label]="editando ? 'Salvar' : 'Cadastrar'" />
          <p-button *ngIf="editando" styleClass="color: blue"
                    type="button"
                    label="Cancelar"
                    severity="danger"
                    (onClick)="cancelarEdicao()" />
        </div>
      </form>
      <p-table #dt2 [value]="produtos" dataKey="id" stripedRows [paginator]="true"
               [rows]="5" *ngIf="!loading && produtos.length"
               [globalFilterFields]="['id', 'nome', 'preco', 'quantidade']">

        <ng-template #caption>
          <div class="flex">
            <p-iconfield iconPosition="left" class="ml-auto">
              <p-inputicon>
                <i class="pi pi-search"></i>
              </p-inputicon>
              <input pInputText type="text" (input)="dt2.filterGlobal($event.target.value, 'contains')" placeholder="Search keyword" />
            </p-iconfield>
          </div>
        </ng-template>

        <ng-template pTemplate="header">
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Quantidade</th>
            <th>Ações</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-p>
          <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.nome }}</td>
            <td>{{ p.preco | currency:'BRL' }}</td>
            <td>{{ p.quantidade }}</td>
            <td>
              <p-button icon="pi pi-pencil"
                        size="small"
                        variant="text"
                        (onClick)="editarProduto(p)" />
              <p-button icon="pi pi-trash"
                        size="small"
                        variant="text"
                        severity="danger"
                        (onClick)="removerProduto(p.id)" />
            </td>
          </tr>
        </ng-template>
      </p-table>

      <div *ngIf="!loading && !produtos.length && !error">
        Nenhum produto encontrado.
      </div>
    </div>
  </div>
</main>
<router-outlet />
